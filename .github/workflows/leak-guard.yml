name: leak-guard
# Backstop scan — เผื่อ push จาก node อื่น / แก้ผ่านเว็บ ที่ไม่ผ่าน pre-push hook
# repo นี้ = GitHub Pages PUBLIC → fail (red X + email) ถ้าเจอ sensitive pattern
# patterns = generic เท่านั้น (ไม่มี codename จริง). ตัวกันก่อนหลุดจริง = pre-push hook ในเครื่อง
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for sensitive patterns
        run: |
          set -uo pipefail
          patterns=(
            '2569[0-9]{4}'
            '[0-9]{13}'
            '-----BEGIN [A-Z ]*PRIVATE KEY-----'
            'AGE-SECRET-KEY-1[A-Z0-9]+'
            '(ghp|gho|ghu|ghs)_[A-Za-z0-9]{20,}'
            'github_pat_[A-Za-z0-9_]{20,}'
            'sk-(ant-)?[A-Za-z0-9-]{20,}'
            'xox[bp]-[A-Za-z0-9-]{10,}'
            'AKIA[A-Z0-9]{16}'
            '100\.(6[4-9]|[7-9][0-9]|1[0-1][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3}'
            '10\.10\.10\.[0-9]{1,3}'
            '192\.168\.[0-9]{1,3}\.[0-9]{1,3}'
            '[a-z0-9]+\.ts\.net'
          )
          hits=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            case "$f" in .github/workflows/leak-guard.yml) continue ;; esac
            for p in "${patterns[@]}"; do
              if grep -nEI "$p" "$f" >/dev/null 2>&1; then
                echo "::error file=$f::sensitive pattern matched: /$p/"
                hits=$((hits+1))
              fi
            done
          done < <(git ls-files)
          if [ "$hits" -gt 0 ]; then
            echo "🛑 leak-guard: $hits match(es) — failing (repo นี้ = PUBLIC web)"
            exit 1
          fi
          echo "✅ leak-guard: clean"
